<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Dashboard - Flask Application</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Local custom stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Markdown Parser & Code Syntax Highlighting CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Gemma Flask</h1>
                    <span>Control & Monitor Center</span>
                </div>
            </div>
            
            <div class="header-status">
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span id="connection-status">Connected</span>
                </div>
                <div class="uptime-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span id="uptime-clock">Uptime: 0s</span>
                </div>
            </div>
        </header>

        <!-- Main Chat Console -->
        <main class="chat-console" id="chat-console">
            <!-- Settings panel (Glassmorphic) -->
            <section class="dashboard-card chat-settings-card">
                <div class="card-header">
                    <div class="card-icon settings-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </div>
                    <h2>Llama Specs</h2>
                </div>
                
                <div class="settings-content">
                    <div class="setting-group">
                        <label for="system-prompt" class="setting-label">System Instructions</label>
                        <textarea id="system-prompt" rows="3" placeholder="Instruct Gemma how to behave...">You are a helpful, respectful, and honest assistant. Keep answers brief and precise.</textarea>
                    </div>
                    
                    <div class="setting-group">
                        <label for="chat-temp" class="setting-label">Temperature: <span id="temp-val">0.7</span></label>
                        <input type="range" id="chat-temp" min="0.1" max="1.5" step="0.1" value="0.7">
                    </div>
                    
                    <div class="setting-group">
                        <label class="setting-label">Llama Service</label>
                        <div class="endpoint-badge">
                            <span class="pulse-dot endpoint-status-dot"></span>
                            <span id="endpoint-status">Checking service...</span>
                        </div>
                    </div>
                </div>
                
                <div class="actions-section" style="margin-top: auto;">
                    <div class="actions-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%;">
                        <button class="btn-action" id="btn-theme-toggle" aria-label="Toggle Accent Color" style="padding: 0.6rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                            <span style="font-size: 0.8rem;">Toggle Hue</span>
                        </button>
                        <button class="btn-action btn-secondary" id="btn-clear-chat" style="padding: 0.6rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                            <span style="font-size: 0.8rem;">Reset Chat</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Main chat window card -->
            <section class="dashboard-card chat-window-card">
                <div class="chat-history" id="chat-history">
                    <!-- Default message -->
                    <div class="chat-message assistant">
                        <div class="message-avatar">G</div>
                        <div class="message-content-wrapper">
                            <div class="message-header">Gemma Agent</div>
                            <div class="message-body">Hello! I am your local Gemma 4 assistant running via Llama.cpp. Type a message below to start chatting!</div>
                        </div>
                    </div>
                </div>

                <form class="chat-input-area" id="chat-form-element" onsubmit="event.preventDefault();">
                    <textarea id="chat-message-input" placeholder="Type a message to Gemma..." rows="1" required autocomplete="off"></textarea>
                    <button type="submit" class="btn-send-message" id="btn-send-message" aria-label="Send Message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </section>
        </main>

        <footer class="app-footer">
            <p>Made with ❤️ using Flask & HTML/CSS/JS</p>
        </footer>
    </div>

    <!-- JS Logic -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
